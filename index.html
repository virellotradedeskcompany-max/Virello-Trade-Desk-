<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Arrange Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="home-screen">
        <h1>Word Arrange Pro</h1>
        <p>Test your brain against the clock!</p>
        <button onclick="startGame()" style="background:#22c55e;">START GAME</button>
        <p><small>Note: Ads help support development.</small></p>
    </div>

    <div id="game-container" style="display:none;">
        <h1>Word Arrange Pro</h1>
        <div id="stats">Level: <span id="level">1</span> | Score: <span id="score">0</span></div>
        <div id="game-ui"></div>
        <button id="hint-btn" onclick="showHint()">Get Hint</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
